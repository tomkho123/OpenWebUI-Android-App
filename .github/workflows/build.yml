name: Build Android APK with Servo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: armv7-linux-androideabi,aarch64-linux-android

    - name: Install Android NDK
      run: |
        sudo apt-get update
        sudo apt-get install -y android-ndk-r25
        echo "ANDROID_NDK_HOME=/usr/lib/android-ndk-r25" >> $GITHUB_ENV

    - name: Cache Cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          servo/target
        key: cargo-${{ hashFiles('**/Cargo.toml') }}
        restore-keys: |
          cargo-

    - name: Build Servo libraries
      run: |
        cd servo
        cargo build --target armv7-linux-androideabi --release
        cargo build --target aarch64-linux-android --release

    - name: Copy native libraries to jniLibs
      run: |
        mkdir -p app/src/main/jniLibs/arm64-v8a
        mkdir -p app/src/main/jniLibs/armeabi-v7a
        cp servo/target/armv7-linux-androideabi/release/libopenwebui_servo.so app/src/main/jniLibs/armeabi-v7a/ || true
        cp servo/target/aarch64-linux-android/release/libopenwebui_servo.so app/src/main/jniLibs/arm64-v8a/ || true

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APK with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-servo
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Get APK size
      run: |
        size=$(du -h app/build/outputs/apk/debug/app-debug.apk | cut -f1)
        echo "APK size: $size"
